spring:
  application:
    name: memo-app
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:memoapp}
    username: ${DB_USER:memo}
    password: ${DB_PASSWORD:memo}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

memo:
  external-api:
    ip-api-base-url: http://ip-api.com/json
    open-weather:
      api-key: ${OPENWEATHER_API_KEY:}
      base-url: https://api.openweathermap.org/data/2.5

logging:
  level:
    root: INFO
    com.example.memo: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
