<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>기록하는 메모장</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
    <style>
        :root {
            --memo-accent: #2d6a4f;
            --memo-accent-soft: #d8f3dc;
            --memo-surface: #f8f9fa;
        }
        body {
            background: linear-gradient(160deg, #e8f5e9 0%, #f1f8f4 45%, #fff 100%);
            min-height: 100vh;
        }
        .page-title {
            color: var(--memo-accent);
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .card-memo {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.25rem 1rem rgba(45, 106, 79, 0.08);
        }
        .card-header-memo {
            background: var(--memo-accent);
            color: #fff;
            border-radius: 1rem 1rem 0 0 !important;
            font-weight: 600;
        }
        .btn-memo-primary {
            background-color: var(--memo-accent);
            border-color: var(--memo-accent);
            color: #fff;
        }
        .btn-memo-primary:hover {
            background-color: #1b4332;
            border-color: #1b4332;
            color: #fff;
        }
        .memo-item {
            border-left: 4px solid var(--memo-accent);
            background: var(--memo-surface);
            border-radius: 0.5rem;
        }
        .log-badge-create {
            background-color: var(--memo-accent-soft);
            color: #1b4332;
        }
        .log-badge-delete {
            background-color: #ffe5e5;
            color: #9b2226;
        }
        textarea.form-control {
            min-height: 120px;
        }
        .memo-ctx {
            font-size: 0.8125rem;
        }
        .memo-ctx .badge {
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="container py-4 py-md-5">
    <header class="mb-4 text-center text-md-start">
        <h1 class="page-title display-6 mb-1">기록하는 메모장</h1>
        <p class="text-muted mb-0 small">메모를 남기면 DB·활동 로그와 함께, WeatherAPI 기준 위치·날씨(키 설정 시)가 자동 기록됩니다.</p>
    </header>

    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card card-memo h-100">
                <div class="card-header card-header-memo py-3">새 메모</div>
                <div class="card-body p-4">
                    <form th:action="@{/memos}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">제목</label>
                            <input type="text" class="form-control" id="title" name="title" required
                                   placeholder="메모 제목을 입력하세요" autocomplete="off"/>
                        </div>
                        <div class="mb-4">
                            <label for="content" class="form-label">내용</label>
                            <textarea class="form-control" id="content" name="content"
                                      placeholder="내용을 입력하세요 (선택)"></textarea>
                        </div>
                        <button type="submit" class="btn btn-memo-primary w-100">저장</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card card-memo mb-4">
                <div class="card-header card-header-memo py-3">메모 목록</div>
                <div class="card-body p-3 p-md-4">
                    <div th:if="${#lists.isEmpty(memos)}" class="text-muted text-center py-4">
                        아직 메모가 없습니다. 왼쪽에서 첫 메모를 남겨 보세요.
                    </div>
                    <ul class="list-unstyled mb-0" th:if="${!#lists.isEmpty(memos)}">
                        <li th:each="memo : ${memos}" class="memo-item p-3 mb-3">
                            <div class="d-flex justify-content-between align-items-start gap-2">
                                <div class="flex-grow-1">
                                    <h2 class="h6 mb-1" th:text="${memo.title}">제목</h2>
                                    <div class="memo-ctx mb-2 d-flex flex-wrap align-items-center gap-2">
                                        <th:block th:if="${memo.hasWeatherOrLocationInfo()}">
                                            <span th:if="${memo.cityName != null}"
                                                  class="badge rounded-pill bg-light text-dark border border-secondary-subtle">
                                                📍 <span th:text="${memo.cityName}">서울</span>
                                            </span>
                                            <span class="text-secondary"
                                                  th:if="${memo.cityName != null && (memo.weatherCondition != null || memo.tempC != null)}">|</span>
                                            <span th:if="${memo.weatherCondition != null || memo.tempC != null}"
                                                  class="badge rounded-pill bg-white text-dark border border-secondary-subtle shadow-sm">
                                                <span th:text="${memo.weatherEmoji}">☀️</span>
                                                <span th:if="${memo.weatherCondition != null}"
                                                      th:text="${' ' + memo.weatherCondition}"> 맑음</span>
                                                <span th:if="${memo.tempC != null}"
                                                      th:text="${' ' + #numbers.formatDecimal(memo.tempC, 1, 1) + '°C'}"> 25°C</span>
                                            </span>
                                        </th:block>
                                        <span th:unless="${memo.hasWeatherOrLocationInfo()}"
                                              class="badge rounded-pill bg-secondary bg-opacity-10 text-secondary border border-secondary-subtle">
                                            위치·날씨 정보 없음 · <span class="small">WEATHER_API_KEY 설정 후 새 메모를 저장해 보세요</span>
                                        </span>
                                    </div>
                                    <p class="small text-muted mb-1"
                                       th:text="${#temporals.format(memo.createdAt.atZone(zone), 'yyyy-MM-dd HH:mm')}">날짜</p>
                                    <p class="mb-0 small" th:text="${memo.content}" style="white-space: pre-wrap;">내용</p>
                                </div>
                                <form th:action="@{/memos/{id}/delete(id=${memo.id})}" method="post" class="shrink-0">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">삭제</button>
                                </form>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="card card-memo">
                <div class="card-header card-header-memo py-3">활동 기록</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th class="ps-4">시각</th>
                                <th>동작</th>
                                <th class="pe-4">메모 제목</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(logs)}">
                                <td colspan="3" class="text-muted text-center py-4">활동 기록이 없습니다.</td>
                            </tr>
                            <tr th:each="log : ${logs}">
                                <td class="ps-4 small text-nowrap"
                                    th:text="${#temporals.format(log.timestamp.atZone(zone), 'yyyy-MM-dd HH:mm:ss')}">시각</td>
                                <td>
                                    <span th:if="${log.actionType.name() == '생성'}"
                                          class="badge rounded-pill log-badge-create">생성</span>
                                    <span th:if="${log.actionType.name() == '삭제'}"
                                          class="badge rounded-pill log-badge-delete">삭제</span>
                                </td>
                                <td class="pe-4" th:text="${log.memoTitle}">제목</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
