# PostgreSQL 없이 로컬에서 바로 실행할 때: SPRING_PROFILES_ACTIVE=local
spring:
  datasource:
    url: jdbc:h2:mem:memoapp;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
